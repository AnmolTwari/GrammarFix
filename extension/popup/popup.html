<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammarFix</title>

    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div class="container">

        <h2>🟦 GrammarFix</h2>

        <div class="status">
            <span id="statusDot"></span>
            <span id="statusText">Running</span>
        </div>

        <p class="version">Version 1.0.0</p>

        <div class="stats">

            <div class="card">
                <h3 id="wordCount">0</h3>
                <p>Words</p>
            </div>

            <div class="card">
                <h3 id="characterCount">0</h3>
                <p>Characters</p>
            </div>

            <div class="card">
                <h3 id="issueCount">0</h3>
                <p>Issues</p>
            </div>

            <div class="card">
                <h3 id="score">100</h3>
                <p>Score</p>
            </div>

        </div>

        <button id="checkNow">Check Current Page</button>

        <button id="settings" class="settings">Settings</button>

    </div>

    <script src="popup.js"></script>

</body>
</html>
