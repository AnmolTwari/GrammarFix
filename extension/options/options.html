<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>GrammarFix Settings</title>

<link rel="stylesheet" href="options.css">

</head>

<body>

<h1>GrammarFix Settings</h1>

<label>

<input type="checkbox" id="enabled">

Enable GrammarFix

</label>

<label>

<input type="checkbox" id="autoCheck">

Auto Check

</label>

<label>

Language

<select id="language">

<option value="en-US">English</option>

</select>

</label>

<label>

Delay

<input
type="number"
id="delay"
value="800"
min="100"
max="3000">

</label>

<button id="save">

Save

</button>

<script src="options.js"></script>

</body>

</html>
